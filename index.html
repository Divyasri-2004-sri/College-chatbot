<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>College Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            margin: 0; padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 60px auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .logo {
            display: block;
            margin: 0 auto 20px;
            width: 120px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        input[type="text"] {
            width: calc(100% - 90px);
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            margin-left: 10px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #response {
            margin-top: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            min-height: 60px;
            white-space: pre-wrap;
            font-size: 16px;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://mir-s3-cdn-cf.behance.net/projects/404/a42236171852785.Y3JvcCwxMzEzLDEwMjcsMTQzLDg3.png" alt="College Logo" class="logo" />
    <h1>🎓 Ask Our College Bot</h1>

    <div style="display: flex;">
        <input type="text" id="user_input" placeholder="Ask something about the college..." />
        <button onclick="sendQuestion()">Send</button>
    </div>

    <div id="response">🤖 Bot's response will appear here...</div>
</div>

<script>
async function sendQuestion() {
    const question = document.getElementById("user_input").value.trim();
    const responseDiv = document.getElementById("response");

    if (!question) {
        responseDiv.innerText = "Please enter a question!";
        return;
    }

    responseDiv.innerText = "Thinking... 🤔";

    try {
        const response = await fetch("https://YOUR_RENDER_URL.onrender.com/api/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ data: [question] })
        });

        if (!response.ok) throw new Error("Network response was not ok");

        const data = await response.json();
        responseDiv.innerText = "🎯 " + data.data[0];
    } catch (err) {
        responseDiv.innerText = "❌ Couldn't contact the chatbot. Make sure the backend is running.";
        console.error(err);
    }
}
</script>

</body>
</html>
